  - sha: cfcd1ee0a7bde9c4ccea5f9f1cd0bf788cf56341
    changeNotes: |
      Web Pixel Studio Cookie Consent for EU v3 – Google Consent Mode v3 edition
      - Google Consent Mode v3 support (extends the standard v2 version)
      - Activation of the developer_id.dZTNiMT signal for verified CMP identification
      - All 7 consent types (ad_storage, ad_user_data, ad_personalization, analytics_storage, functionality_storage, personalization_storage, security_storage)
      - Automatic setup of ads_data_redaction and url_passthrough
      - Cookie-based consent reading (ccwps_consent)
      - EU GDPR and EDPB compliance
      - Lightweight, no external dependencies
